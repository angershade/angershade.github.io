<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spreadsheet-Like Grid</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px;
        }
        th {
            background-color: #f2f2f2;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .container {
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <table>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Start Date</th>
                    <th>Genre</th>
                    <th>End Date</th>
                    <th>Mood</th>
                    <th>Release Date</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td="Title">2017</td>
                    <td="Start Date">10</td>
                    <td="Genre">*</td>
                    <td="End Date">*</td>
                    <td></td>
                    <td>13</td>
                </tr>
                <tr>
                    <td>2018</td>
                    <td>20</td>
                    <td>11</td>
                    <td>14</td>
                    <td>13</td>
                    <td>13</td>
                </tr>
                <tr>
                    <td>2019</td>
                    <td>30</td>
                    <td>15</td>
                    <td>12</td>
                    <td>13</td>
                </tr>
                <!-- Add more rows as needed -->
            </tbody>
        </table>
    </div>
</body>
</html>
