<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Page Title</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        @font-face {
            font-family: 'Neue Helvetica';
            src: url('path-to-your-font-files/NeueHelvetica.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
    </style>
</head>
<body>
    <div id="header"></div>
    
    <main>
        <h1>Main Content Area</h1>
        <p>This is where your main content goes.</p>
    </main>
    
    <div id="footer"></div>

    <script>
        document.getElementById('header').innerHTML = fetch('header.html').then(response => response.text());
        document.getElementById('footer').innerHTML = fetch('footer.html').then(response => response.text());

        function toggleMenu() {
            var menu = document.getElementById('dropdown-content');
            if (menu.style.display === 'block') {
                menu.style.display = 'none';
            } else {
                menu.style.display = 'block';
            }
        }

        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn')) {
                var dropdowns = document.getElementsByClassName('dropdown-content');
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.style.display === 'block') {
                        openDropdown.style.display = 'none';
                    }
                }
            }
        }
    </script>
</body>
</html>
