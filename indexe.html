<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Angershade</title>
    <link rel="stylesheet" href="https://angershade.github.io/styles.css">
    <style>
        @font-face {
            font-family: 'Neue Helvetica';
            src: url('path-to-your-font-files/NeueHelvetica.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="https://angershade.github.io/docs/assets/fulllogoB.png" alt="Logo">
        </div>
        <div class="dropdown">
            <button class="dropbtn">☰</button>
            <div class="dropdown-content">
                <b>ABOUT</b>
                <a href="angershade.com/about">bio</a>
                <a href="angershade.com/gear">gear</a>
                <a href="https://hyperfollow.com/brianyegge">Links</a>
                <b>MUSIC</b>
                <a href="angershade.com/albums.html">The Albums</a>
                <a href="angershade.com/tracks.html">The Tracks</a>
                <a href="angershade.com/vault">Vault</a>
                <b>CONNECT</b>
                <a href="https://x.com/x_byegge">𝕏</a>
                <a href="https://youtube.com/@angershade">Artist Channel</a>
                <a href="https://instagram.com/angershade">Instagram</a>
                <a href="https://facebook.com/brian.e.yegge">facebook</a>
            </div>
        </div>
    </header>

    <main>
        <h1>Main Content Area</h1>
        <p>This is where your main content goes.</p>
    </main>
    
    <footer>
        <center>
        <p>© 2024 Angershade  Yegge  All rights reserved <br>
        <a href="https://angershade.github.io/tos">Terms & Conditions</a></p>
        </center>
    </footer>
    <script>
        document.querySelector('.dropbtn').addEventListener('click', function() {
            var menu = document.querySelector('.dropdown-content');
            if (menu.style.display === 'block') {
                menu.style.display = 'none';
            } else {
                menu.style.display = 'block';
            }
        });

        window.onclick = function(event) {
            if (!event.target.matches('.dropbtn')) {
                var dropdowns = document.querySelectorAll('.dropdown-content');
                dropdowns.forEach(function(dropdown) {
                    if (dropdown.style.display === 'block') {
                        dropdown.style.display = 'none';
                    }
                });
            }
        }
    </script>
</body>
</html>
